<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing</title>
</head>
<body>

    <ul class="language">
        <li>Javascript</li>
    </ul>
    
</body>

<script>
    function addLanguage(langName) {
        const li = document.createElement('li');
        li.innerHTML = `${langName}`;
        document.querySelector('.language').appendChild(li);
    }
    addLanguage('Python');
    addLanguage('Java');
    addLanguage('C++');

    function addOptiLang(langName) {
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName));
        document.querySelector('.language').appendChild(li);
    }
    addOptiLang('Go');
    addOptiLang('Rust');

    // Edit

    // const secondLang = document.querySelector(".language li:nth-child(2)");
    // console.log('secondLang',secondLang);
    // secondLang.innerHTML = 'TypeScript';


    // const newLI = document.createElement('li');
    // newLI.textContent = 'Ruby';
    // secondLang.replaceWith(newLI);

    const firstLang = document.querySelector("li:first-child");
    firstLang.outerHTML = '<li>PHP</li>';

    // remove

    const lastLang = document.querySelector("li:last-child");
    lastLang.remove();
</script>
</html>
